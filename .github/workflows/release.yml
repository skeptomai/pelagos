name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables iproute2 passt
      - name: Build
        run: cargo build
      - name: Build rootfs
        run: sudo ./scripts/build-rootfs-tarball.sh
      - name: Reset test environment
        run: sudo ./scripts/reset-test-env.sh
      - name: Run integration tests
        run: sudo -E env "PATH=$PATH" cargo test --test integration_tests -- --test-threads=1

  build:
    needs: [lint, unit-tests, integration-tests]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: pelagos-x86_64-linux
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            artifact: pelagos-aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain and build deps
        run: sudo apt-get install -y musl-tools cmake
      - name: Build release binary (musl static)
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact
        run: |
          cp target/${{ matrix.target }}/release/pelagos ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
      - name: Verify static binary
        run: |
          file ${{ matrix.artifact }}
          ldd ${{ matrix.artifact }} || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          generate_release_notes: true
      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  package:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: pelagos-x86_64-linux
          path: dist/amd64
      - name: Download aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: pelagos-aarch64-linux
          path: dist/arm64
      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -q
          sudo apt-get install -y nfpm
      - name: Build packages
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist/packages

          for row in "amd64 pelagos-x86_64-linux" "arm64 pelagos-aarch64-linux"; do
            ARCH=$(echo $row | cut -d' ' -f1)
            BINARY_NAME=$(echo $row | cut -d' ' -f2)
            BINARY="dist/$ARCH/$BINARY_NAME"
            chmod +x "$BINARY"

            ARCH=$ARCH VERSION=$VERSION BINARY=$BINARY \
              nfpm package --config pkg/nfpm/nfpm.yaml --packager deb \
              --target "dist/packages/pelagos_${VERSION}_${ARCH}.deb"

            ARCH=$ARCH VERSION=$VERSION BINARY=$BINARY \
              nfpm package --config pkg/nfpm/nfpm.yaml --packager rpm \
              --target "dist/packages/pelagos_${VERSION}_${ARCH}.rpm"
          done
      - name: Upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*
      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/packages/

  package-test:
    needs: [package]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: packages
      - name: Install system dependencies
        run: sudo apt-get install -y nftables iproute2
      - name: Install .deb
        run: sudo dpkg -i pelagos_*_${{ matrix.arch }}.deb
      - name: Verify installation
        run: |
          test "$(which pelagos)" = "/usr/bin/pelagos"
          pelagos --version
          test -d /var/lib/pelagos
          test -f /usr/share/pelagos/setup.sh
          test -f /usr/lib/tmpfiles.d/pelagos.conf
      - name: Simulate tmpfiles.d boot
        run: sudo systemd-tmpfiles --create /usr/lib/tmpfiles.d/pelagos.conf
      - name: Verify /run/pelagos created
        run: test -d /run/pelagos
      - name: Smoke test — run a container
        run: sudo pelagos run --rm alpine echo pelagos-deb-ok
