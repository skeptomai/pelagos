name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables iproute2 passt
      - name: Build
        run: cargo build
      - name: Build rootfs
        run: sudo ./scripts/build-rootfs-tarball.sh
      - name: Reset test environment
        run: sudo ./scripts/reset-test-env.sh
      - name: Run integration tests
        run: sudo -E env "PATH=$PATH" cargo test --test integration_tests -- --test-threads=1

  build:
    needs: [lint, unit-tests, integration-tests]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: pelagos-x86_64-linux
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            artifact: pelagos-aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain and build deps
        run: sudo apt-get install -y musl-tools cmake
      - name: Build release binary (musl static)
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact
        run: |
          cp target/${{ matrix.target }}/release/pelagos ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
      - name: Verify static binary
        run: |
          file ${{ matrix.artifact }}
          ldd ${{ matrix.artifact }} || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          generate_release_notes: true
