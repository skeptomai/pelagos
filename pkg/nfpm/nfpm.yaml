name: pelagos
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
maintainer: Christopher Brown <cjbrown102@gmail.com>
description: |
  Fast Linux container runtime — OCI-compatible, namespaces, cgroups v2,
  seccomp, networking, and image management.
vendor: pelagos-containers
homepage: https://github.com/pelagos-containers/pelagos
license: Apache-2.0

depends:
  - nftables
  - iproute2

suggests:
  - passt
  - fuse-overlayfs
  - dnsmasq

contents:
  - src: "${BINARY}"
    dst: /usr/bin/pelagos
    file_info:
      mode: 0755

  - src: scripts/setup.sh
    dst: /usr/share/pelagos/setup.sh
    file_info:
      mode: 0755

  - src: pkg/nfpm/pelagos.tmpfiles
    dst: /usr/lib/tmpfiles.d/pelagos.conf
    file_info:
      mode: 0644

  - src: LICENSE
    dst: /usr/share/doc/pelagos/copyright
    file_info:
      mode: 0644

  - src: README.md
    dst: /usr/share/doc/pelagos/README.md
    file_info:
      mode: 0644

scripts:
  postinstall: pkg/nfpm/postinstall.sh
